<script>
    // Fetch unread notifications
    function fetchUnreadNotifications() {
        $.ajax({
            url: 'get_unread_notifications.php',
            method: 'GET',
            dataType: 'json',
            success: function(data) {
                const count = data.unread_count;
                const notifBadge = $('#notification-count');
                
                if (count > 0) {
                    notifBadge.text(count).show();
                } else {
                    notifBadge.hide();
                }
            }
        });
    }

    // Fetch all notifications when the bell is clicked
    $('#notificationsButton').on('click', function() {
        $.ajax({
            url: 'get_all_notifications.php',  // Create a new PHP file to fetch all notifications
            method: 'GET',
            dataType: 'json',
            success: function(data) {
                const notifications = data.notifications;
                let notificationHTML = '';

                notifications.forEach(notification => {
                    notificationHTML += `
                        <div class="notification-item">
                            <p>${notification.message}</p>
                            <small>${notification.created_at}</small>
                        </div>
                    `;
                });

                $('#notification-list').html(notificationHTML);
                $('#notificationsModal').modal('show');  // Show the modal
            }
        });
    });

    // Initial fetch of unread notifications
    $(document).ready(function() {
        fetchUnreadNotifications();
    });
</script>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const selfieInput = document.getElementById('selfieImageData');
  const submitBtn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const captureBtn = document.getElementById('captureBtn');
  let stream;

  document.getElementById('cameraModal').addEventListener('shown.bs.modal', async () => {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
    } catch (err) {
      Swal.fire("Camera Error", "Unable to access camera: " + err.message, "error");
    }
  });

  captureBtn.addEventListener('click', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const dataURL = canvas.toDataURL('image/jpeg');
    selfieInput.value = dataURL;

    // Stop the video stream
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }

    // Hide modal and show submit
    const modal = bootstrap.Modal.getInstance(document.getElementById('cameraModal'));
    modal.hide();
    submitBtn.classList.remove('hidden');
    Swal.fire("Selfie Captured ✅", "Your selfie has been captured successfully.", "success");
  });

  document.getElementById('faceVerifyForm').addEventListener('submit', function (e) {
    e.preventDefault();

    if (!selfieInput.value) {
      return Swal.fire("Missing Selfie", "Please capture your selfie before submitting.", "warning");
    }

    const formData = new FormData(this);
    submitBtn.disabled = true;
    spinner.classList.remove('hidden');

    fetch('verify_face.php', {
      method: 'POST',
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      submitBtn.disabled = false;
      spinner.classList.add('hidden');

      if (data.status === "success") {
        Swal.fire({
          title: "Verified ✅",
          text: data.message || "Face Match Verification successful.",
          icon: "success",
          confirmButtonText: "Continue"
        }).then(() => {
          if (data.redirect) {
            window.location.href = data.redirect;
          }
        });

      } else if (data.status === "fail") {
        Swal.fire("Verification Failed ❌", data.message || "Face does not match.", "error");
      } else if (data.status === "blocked") {
        Swal.fire({
          icon: "error",
          title: "Retry Limit Reached ⛔",
          text: data.message || "Please try again after 24 hours.",
          confirmButtonText: "Okay"
        });

      } else {
        Swal.fire("Error", data.message || "Unexpected error occurred.", "error");
      }
    })
    .catch(err => {
      submitBtn.disabled = false;
      spinner.classList.add('hidden');
      Swal.fire("Request Error", "Unable to complete request: " + err.message, "error");
    });
  });
</script>
